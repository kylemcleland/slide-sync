<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p { color: #888; margin-bottom: 2rem; font-size: 1.1rem; }
    a.btn { display: inline-block; padding: 1rem 2.5rem; background: #fff; color: #0a0a0a; text-decoration: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; transition: transform 0.1s; }
    a.btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Slide Sync</h1>
    <p>Present slides. Audience follows along in real-time.</p>
    <a href="/present" class="btn">Start Presenting</a>
  </div>
</body>
</html>
