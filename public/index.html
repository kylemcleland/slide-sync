<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slide Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #slide { max-width: 100vw; max-height: 100vh; max-height: 100dvh; object-fit: contain; }
    #counter { position: fixed; bottom: 0.75rem; right: 0.75rem; color: #444; font-size: 0.75rem; }
  </style>
</head>
<body>
  <img id="slide" src="" alt="Slide">
  <div id="counter"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on('slide-change', (data) => {
      document.getElementById('slide').src = data.slide;
      document.getElementById('counter').textContent = `${data.index + 1} / ${data.total}`;
    });
  </script>
</body>
</html>
