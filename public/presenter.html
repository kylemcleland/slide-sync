<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presenter — Slide Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    .header h2 { font-size: 1rem; color: #888; }
    .share-info { display: flex; align-items: center; gap: 1rem; }
    .share-info button { padding: 0.4rem 0.8rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .share-info button:hover { background: #444; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .main img { max-width: 100%; max-height: calc(100vh - 140px); object-fit: contain; border-radius: 4px; }
    .controls { padding: 1rem 1.5rem; display: flex; justify-content: center; align-items: center; gap: 1.5rem; border-top: 1px solid #222; }
    .controls button { padding: 0.6rem 1.5rem; background: #222; color: #fff; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .controls button:hover:not(:disabled) { background: #333; }
    .controls button:disabled { opacity: 0.3; cursor: default; }
    .controls span { font-size: 0.9rem; color: #888; min-width: 80px; text-align: center; }
    .thumbnails { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; overflow-x: auto; border-top: 1px solid #222; }
    .thumbnails img { height: 50px; border-radius: 3px; cursor: pointer; opacity: 0.4; border: 2px solid transparent; }
    .thumbnails img:hover { opacity: 0.7; }
    .thumbnails img.active { opacity: 1; border-color: #4af; }
    .qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    .qr-modal.show { display: flex; }
    .qr-modal img { background: #fff; padding: 1rem; border-radius: 12px; }
    .qr-modal p { color: #ccc; font-size: 1.1rem; }
    .qr-modal button { padding: 0.5rem 1.5rem; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h2>Presenter</h2>
    <div class="share-info">
      <button id="qrBtn">QR Code</button>
      <button id="copyBtn">Copy Audience Link</button>
    </div>
  </div>
  <div class="main"><img id="currentSlide" src="" alt="Slide"></div>
  <div id="thumbnailBar" class="thumbnails"></div>
  <div class="controls">
    <button id="prevBtn">&larr; Prev</button>
    <span id="slideCounter">0 / 0</span>
    <button id="nextBtn">Next &rarr;</button>
  </div>
  <div id="qrModal" class="qr-modal">
    <p>Scan to follow along</p>
    <img id="qrImage" src="" alt="QR Code">
    <p id="qrUrl" style="font-size: 0.85rem; color: #888;"></p>
    <button onclick="document.getElementById('qrModal').classList.remove('show')">Close</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let slides = [];
    let current = 0;
    const audienceUrl = window.location.origin;

    fetch('/api/slides').then(r => r.json()).then(data => {
      slides = data.slides;
      current = data.current;
      buildThumbnails();
      updateSlide();
    });

    socket.on('slide-change', (data) => { current = data.index; updateSlide(); });

    function updateSlide() {
      document.getElementById('currentSlide').src = slides[current];
      document.getElementById('slideCounter').textContent = `${current + 1} / ${slides.length}`;
      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === slides.length - 1;
      document.querySelectorAll('.thumbnails img').forEach((img, i) => img.classList.toggle('active', i === current));
    }

    function buildThumbnails() {
      const bar = document.getElementById('thumbnailBar');
      slides.forEach((s, i) => {
        const img = document.createElement('img');
        img.src = s;
        img.onclick = () => socket.emit('navigate', i);
        bar.appendChild(img);
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => socket.emit('navigate', 'prev'));
    document.getElementById('nextBtn').addEventListener('click', () => socket.emit('navigate', 'next'));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); socket.emit('navigate', 'next'); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); socket.emit('navigate', 'prev'); }
    });

    document.getElementById('qrBtn').addEventListener('click', () => {
      document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(audienceUrl)}`;
      document.getElementById('qrUrl').textContent = audienceUrl;
      document.getElementById('qrModal').classList.add('show');
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(audienceUrl).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Audience Link', 1500);
      });
    });
  </script>
</body>
</html>
