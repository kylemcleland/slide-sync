<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Presenter — Slide Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; -webkit-user-select: none; user-select: none; }

    /* Header — compact on mobile */
    .header { padding: 0.5rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    .header h2 { font-size: 0.85rem; color: #888; }
    .share-info { display: flex; gap: 0.5rem; }
    .share-info button { padding: 0.3rem 0.6rem; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

    /* Slide preview */
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0.5rem; min-height: 0; }
    .main img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }

    /* Big touch-friendly nav buttons */
    .nav-buttons { display: flex; gap: 0; border-top: 1px solid #222; }
    .nav-buttons button {
      flex: 1; padding: 1.25rem; background: #111; color: #fff; border: none;
      font-size: 1.2rem; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: background 0.1s;
    }
    .nav-buttons button:first-child { border-right: 1px solid #222; }
    .nav-buttons button:active { background: #333; }
    .nav-buttons button:disabled { color: #333; }
    .nav-buttons .counter {
      display: flex; align-items: center; justify-content: center;
      padding: 0 1rem; color: #666; font-size: 0.9rem; white-space: nowrap;
    }

    /* Thumbnails — scrollable strip */
    .thumbnails { display: flex; gap: 0.4rem; padding: 0.5rem 0.75rem; overflow-x: auto; border-top: 1px solid #222; -webkit-overflow-scrolling: touch; }
    .thumbnails img { height: 40px; border-radius: 3px; cursor: pointer; opacity: 0.3; border: 2px solid transparent; flex-shrink: 0; }
    .thumbnails img.active { opacity: 1; border-color: #4af; }

    /* QR modal */
    .qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    .qr-modal.show { display: flex; }
    .qr-modal img { background: #fff; padding: 1rem; border-radius: 12px; }
    .qr-modal p { color: #ccc; font-size: 1.1rem; }
    .qr-modal button { padding: 0.75rem 2rem; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }

    /* Desktop: wider buttons are fine */
    @media (min-width: 768px) {
      .nav-buttons button { padding: 1rem 2rem; font-size: 1rem; }
      .header { padding: 0.75rem 1.5rem; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Presenter</h2>
    <div class="share-info">
      <button id="qrBtn">QR</button>
      <button id="copyBtn">Copy Link</button>
    </div>
  </div>

  <div class="main"><img id="currentSlide" src="" alt="Slide"></div>

  <div id="thumbnailBar" class="thumbnails"></div>

  <div class="nav-buttons">
    <button id="prevBtn">&larr; PREV</button>
    <div class="counter"><span id="slideCounter">0 / 0</span></div>
    <button id="nextBtn">NEXT &rarr;</button>
  </div>

  <div id="qrModal" class="qr-modal">
    <p>Scan to follow along</p>
    <img id="qrImage" src="" alt="QR Code">
    <p id="qrUrl" style="font-size: 0.85rem; color: #888;"></p>
    <button onclick="document.getElementById('qrModal').classList.remove('show')">Close</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let slides = [];
    let current = 0;
    const audienceUrl = window.location.origin;

    fetch('/api/slides').then(r => r.json()).then(data => {
      slides = data.slides;
      current = data.current;
      buildThumbnails();
      updateSlide();
    });

    socket.on('slide-change', (data) => { current = data.index; updateSlide(); });

    function updateSlide() {
      document.getElementById('currentSlide').src = slides[current];
      document.getElementById('slideCounter').textContent = `${current + 1} / ${slides.length}`;
      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === slides.length - 1;
      document.querySelectorAll('.thumbnails img').forEach((img, i) => img.classList.toggle('active', i === current));
    }

    function buildThumbnails() {
      const bar = document.getElementById('thumbnailBar');
      slides.forEach((s, i) => {
        const img = document.createElement('img');
        img.src = s;
        img.onclick = () => socket.emit('navigate', i);
        bar.appendChild(img);
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => socket.emit('navigate', 'prev'));
    document.getElementById('nextBtn').addEventListener('click', () => socket.emit('navigate', 'next'));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); socket.emit('navigate', 'next'); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); socket.emit('navigate', 'prev'); }
    });

    document.getElementById('qrBtn').addEventListener('click', () => {
      document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(audienceUrl)}`;
      document.getElementById('qrUrl').textContent = audienceUrl;
      document.getElementById('qrModal').classList.add('show');
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(audienceUrl).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Link', 1500);
      });
    });
  </script>
</body>
</html>
