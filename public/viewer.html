<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Slide Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #slide { max-width: 100vw; max-height: 100vh; max-height: 100dvh; object-fit: contain; }
    #waiting { color: #666; text-align: center; padding: 2rem; }
    #waiting h2 { margin-bottom: 0.5rem; color: #888; }
    #counter { position: fixed; bottom: 0.75rem; right: 0.75rem; color: #444; font-size: 0.75rem; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="waiting">
    <h2>Slide Sync</h2>
    <p>Waiting for presenter...</p>
  </div>
  <img id="slide" style="display:none" alt="Slide">
  <div id="counter"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const roomId = window.location.pathname.split('/').pop();
    const socket = io();

    socket.emit('viewer-join', roomId);

    socket.on('slide-change', (data) => {
      document.getElementById('waiting').style.display = 'none';
      const img = document.getElementById('slide');
      img.src = data.slide;
      img.style.display = 'block';
      document.getElementById('counter').textContent = `${data.index + 1} / ${data.total}`;
    });

    socket.on('waiting', () => {
      document.getElementById('waiting').style.display = 'block';
      document.getElementById('slide').style.display = 'none';
    });

    socket.on('error', (msg) => {
      document.getElementById('waiting').innerHTML = `<h2>Error</h2><p>${msg}</p>`;
    });

    // Reconnect and rejoin
    socket.on('connect', () => socket.emit('viewer-join', roomId));
  </script>
</body>
</html>
